<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>プロジェクト一覧 — SVG Font Maker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #f5f5f5; color: #000; font-size: 14px;
    }

    /* ─── Header ─── */
    .header {
      display: flex; align-items: center; gap: 12px;
      background: #fff; border-bottom: 2px solid #000;
      padding: 0 16px; height: 52px;
    }
    .back-btn {
      background: none; border: none; cursor: pointer; font-size: 22px;
      color: #000; padding: 4px 8px; display: flex; align-items: center;
      text-decoration: none;
    }
    .back-btn:hover { color: #555; }
    .header-title { font-size: 18px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; flex: 1; }
    .header-count { font-size: 12px; color: #888; font-weight: 600; }

    /* ─── Auth UI ─── */
    .auth-area { display: flex; align-items: center; gap: 8px; margin-left: auto; }
    .auth-btn {
      background: #000; color: #fff; border: none; padding: 6px 14px;
      border-radius: 4px; font-size: 12px; font-weight: 700; cursor: pointer;
      letter-spacing: 0.5px; transition: background 0.15s; display: flex;
      align-items: center; gap: 6px;
    }
    .auth-btn:hover { background: #333; }
    .auth-btn.logout { background: #fff; color: #000; border: 2px solid #000; }
    .auth-btn.logout:hover { background: #f0f0f0; }
    .auth-avatar {
      width: 28px; height: 28px; border-radius: 50%; border: 2px solid #000;
    }
    .auth-name { font-size: 12px; font-weight: 600; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cloud-msg {
      background: #f0f0f0; border: 2px solid #ccc; border-radius: 8px;
      padding: 10px 16px; margin-bottom: 16px; font-size: 12px;
      color: #666; line-height: 1.6; text-align: center;
    }
    .cloud-msg.logged-in {
      background: #f0fff0; border-color: #8c8; color: #060;
    }
    .syncing-indicator {
      font-size: 11px; color: #888; text-align: center; padding: 8px;
    }

    /* ─── Content ─── */
    .content { max-width: 800px; margin: 0 auto; padding: 24px 16px; }

    /* ─── New project button ─── */
    .new-project-btn {
      width: 100%; padding: 16px; margin-bottom: 20px;
      background: #000; color: #fff; border: none; border-radius: 8px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      letter-spacing: 1px; transition: background 0.15s;
    }
    .new-project-btn:hover { background: #333; }
    .new-project-btn:disabled { background: #999; cursor: default; }

    /* ─── Project cards ─── */
    .project-list { display: flex; flex-direction: column; gap: 12px; }

    .project-card {
      background: #fff; border: 2px solid #000; border-radius: 8px;
      overflow: hidden; transition: box-shadow 0.15s;
    }
    .project-card:hover { box-shadow: 4px 4px 0 #000; }

    .card-top {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 16px 12px;
    }
    .card-icon {
      width: 52px; height: 52px; background: #000; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 24px; font-weight: 900; flex-shrink: 0;
      font-family: serif;
    }
    .card-info { flex: 1; min-width: 0; }
    .card-name {
      font-size: 18px; font-weight: 800; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    .card-author {
      font-size: 12px; color: #888; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }

    .card-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .card-act-btn {
      width: 38px; height: 38px; background: #000; color: #fff;
      border: none; border-radius: 6px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.12s;
    }
    .card-act-btn:hover { background: #444; }
    .card-act-btn svg { width: 16px; height: 16px; }

    .card-bottom {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; border-top: 1px solid #eee;
    }
    .card-date { font-size: 12px; color: #aaa; font-family: monospace; }
    .card-style { font-size: 11px; color: #888; margin-left: 8px; }
    .card-open {
      font-size: 13px; font-weight: 700; color: #000;
      text-decoration: none; letter-spacing: 1px;
      text-transform: uppercase;
    }
    .card-open:hover { text-decoration: underline; }

    /* ─── Empty state ─── */
    .empty-state {
      text-align: center; padding: 60px 20px; color: #aaa;
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    /* ─── Modal ─── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.4); display: flex;
      align-items: center; justify-content: center;
    }
    .modal-overlay.hidden { display: none; }
    .modal-box {
      background: #fff; border: 2px solid #000; border-radius: 8px;
      width: 380px; max-width: 90vw;
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px; border-bottom: 1px solid #ddd;
      font-size: 15px; font-weight: 700;
    }
    .modal-close {
      background: none; border: none; font-size: 20px; cursor: pointer; color: #666;
    }
    .modal-close:hover { color: #000; }
    .modal-body { padding: 18px; }
    .modal-field { margin-bottom: 14px; }
    .modal-field label {
      display: block; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px;
      color: #888; margin-bottom: 4px;
    }
    .modal-field input, .modal-field select {
      width: 100%; padding: 8px 10px; border: 2px solid #ccc;
      border-radius: 4px; font-size: 14px;
    }
    .modal-field input:focus, .modal-field select:focus {
      outline: none; border-color: #000;
    }
    .modal-submit {
      width: 100%; padding: 10px; background: #000; color: #fff;
      border: none; border-radius: 6px; font-size: 14px;
      font-weight: 700; cursor: pointer;
    }
    .modal-submit:hover { background: #333; }

    /* ─── Responsive ─── */
    @media (max-width: 500px) {
      .card-name { font-size: 15px; }
      .card-icon { width: 44px; height: 44px; font-size: 20px; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <a href="index.html" class="back-btn">←</a>
    <div class="header-title">SVG Font Maker</div>
    <button class="lang-toggle" onclick="I18N.toggle()" style="background:#000;color:#fff;border:none;padding:4px 10px;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;margin-right:8px">EN</button>
    <div class="header-count" id="project-count">0 / 30</div>
    <div class="auth-area" id="auth-area">
      <button class="auth-btn" id="login-btn" onclick="FirebaseApp.signIn()" style="display:none">
        <svg width="16" height="16" viewBox="0 0 48 48" style="flex-shrink:0"><path fill="#fff" d="M44.5 20H24v8.5h11.8C34.7 33.9 30.1 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 4.1 29.6 2 24 2 11.8 2 2 11.8 2 24s9.8 22 22 22c11 0 21-8 21-22 0-1.3-.2-2.7-.5-4z"/></svg>
        Googleでログイン
      </button>
      <div id="user-info" style="display:none;align-items:center;gap:8px">
        <img class="auth-avatar" id="user-avatar" src="" alt="">
        <span class="auth-name" id="user-name"></span>
        <button class="auth-btn logout" id="logout-btn" onclick="FirebaseApp.signOut()">ログアウト</button>
      </div>
    </div>
  </div>

  <!-- Content -->
  <div class="content">
    <div class="cloud-msg" id="cloud-msg">
      ログインするとクラウドに保存されます
    </div>
    <button class="new-project-btn" id="new-project-btn" data-i18n="new_project">＋ 新規プロジェクト</button>
    <div class="project-list" id="project-list"></div>
  </div>

  <!-- New/Edit Project Modal -->
  <div class="modal-overlay hidden" id="modal">
    <div class="modal-box">
      <div class="modal-header">
        <span id="modal-title" data-i18n="modal_new">新規プロジェクト</span>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-field">
          <label>フォント名</label>
          <input type="text" id="m-name" placeholder="MyFont" maxlength="40" required>
        </div>
        <div class="modal-field">
          <label>作者</label>
          <input type="text" id="m-author" placeholder="Author Name" maxlength="40">
        </div>
        <div class="modal-field">
          <label>スタイル</label>
          <select id="m-style">
            <option value="Regular">Regular</option>
            <option value="Bold">Bold</option>
            <option value="Italic">Italic</option>
            <option value="Bold Italic">Bold Italic</option>
            <option value="Light">Light</option>
            <option value="Medium">Medium</option>
            <option value="SemiBold">SemiBold</option>
            <option value="ExtraBold">ExtraBold</option>
            <option value="Thin">Thin</option>
          </select>
        </div>
        <button class="modal-submit" id="modal-submit">作成</button>
      </div>
    </div>
  </div>

  <script>
    const MAX_PROJECTS = 30;
    const STORAGE_KEY = 'svgfontmaker_projects';
    let editingId = null;

    // ─── Storage ───
    function loadProjects() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch { return []; }
    }
    function saveProjects(projects) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(projects));
    }

    // ─── Render ───
    function render() {
      const projects = loadProjects();
      const list = document.getElementById('project-list');
      const countEl = document.getElementById('project-count');
      const newBtn = document.getElementById('new-project-btn');

      countEl.textContent = `${projects.length} / ${MAX_PROJECTS}`;
      newBtn.disabled = projects.length >= MAX_PROJECTS;

      if (!projects.length) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="icon">T</div>
            <p>プロジェクトがありません<br>「新規プロジェクト」で始めましょう</p>
          </div>`;
        return;
      }

      list.innerHTML = projects.map(p => {
        const initial = (p.name || 'F').charAt(0).toUpperCase();
        const date = new Date(p.created).toLocaleDateString('ja-JP');
        const author = p.author ? `by ${p.author}` : '';
        const style = p.style && p.style !== 'Regular' ? p.style : '';
        return `
          <div class="project-card" data-id="${p.id}">
            <div class="card-top">
              <div class="card-icon">${initial}</div>
              <div class="card-info">
                <div class="card-name">${esc(p.name)}</div>
                <div class="card-author">${esc(author)}</div>
              </div>
              <div class="card-actions">
                <button class="card-act-btn" onclick="editProject('${p.id}')" title="編集">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                </button>
                <button class="card-act-btn" onclick="deleteProject('${p.id}')" title="削除" style="background:#fff;color:#000;border:2px solid #000">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
                </button>
              </div>
            </div>
            <div class="card-bottom">
              <span>
                <span class="card-date">${date}</span>
                <span class="card-style">${esc(style)}</span>
              </span>
              <a href="font-editor/index.html?project=${p.id}" class="card-open">OPEN →</a>
            </div>
          </div>`;
      }).join('');
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }

    // ─── Create / Edit ───
    function openModal(id) {
      editingId = id || null;
      const modal = document.getElementById('modal');
      const titleEl = document.getElementById('modal-title');
      const submitEl = document.getElementById('modal-submit');
      const nameEl = document.getElementById('m-name');
      const authorEl = document.getElementById('m-author');
      const styleEl = document.getElementById('m-style');

      if (id) {
        const projects = loadProjects();
        const p = projects.find(x => x.id === id);
        if (p) {
          titleEl.textContent = 'プロジェクト編集';
          submitEl.textContent = '保存';
          nameEl.value = p.name || '';
          authorEl.value = p.author || '';
          styleEl.value = p.style || 'Regular';
        }
      } else {
        titleEl.textContent = '新規プロジェクト';
        submitEl.textContent = '作成';
        nameEl.value = '';
        authorEl.value = '';
        styleEl.value = 'Regular';
      }
      modal.classList.remove('hidden');
      nameEl.focus();
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
      editingId = null;
    }

    function submitModal() {
      const name = document.getElementById('m-name').value.trim();
      if (!name) { document.getElementById('m-name').focus(); return; }
      const author = document.getElementById('m-author').value.trim();
      const style = document.getElementById('m-style').value;
      const projects = loadProjects();

      if (editingId) {
        const p = projects.find(x => x.id === editingId);
        if (p) {
          p.name = name;
          p.author = author;
          p.style = style;
          // Also update the project data if it exists
          const dataKey = 'svgfontmaker_data_' + editingId;
          try {
            const data = JSON.parse(localStorage.getItem(dataKey));
            if (data) {
              data.name = name;
              data.author = author;
              data.style = style;
              localStorage.setItem(dataKey, JSON.stringify(data));
            }
          } catch {}
        }
      } else {
        if (projects.length >= MAX_PROJECTS) return;
        const id = Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
        projects.push({
          id,
          name,
          author,
          style,
          created: new Date().toISOString(),
        });
        // Create default project data
        const defaultData = {
          name,
          style,
          description: '',
          copyright: '',
          license: '',
          author,
          authorUrl: '',
          vendorUrl: '',
          upm: 1000,
          ascender: 800,
          descender: -200,
          capHeight: 700,
          xHeight: 500,
          defaultLsb: 50,
          defaultRsb: 50,
          glyphs: {},
          kerning: {},
          ligatures: [],
        };
        localStorage.setItem('svgfontmaker_data_' + id, JSON.stringify(defaultData));
      }

      saveProjects(projects);
      closeModal();
      render();
    }

    function editProject(id) {
      openModal(id);
    }

    function deleteProject(id) {
      if (!confirm('このプロジェクトを削除しますか？')) return;
      let projects = loadProjects();
      projects = projects.filter(p => p.id !== id);
      saveProjects(projects);
      localStorage.removeItem('svgfontmaker_data_' + id);
      render();
    }

    // ─── Events ───
    document.getElementById('new-project-btn').addEventListener('click', () => openModal(null));
    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('modal').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeModal();
    });
    document.getElementById('modal-submit').addEventListener('click', submitModal);
    document.getElementById('m-name').addEventListener('keydown', e => {
      if (e.key === 'Enter') submitModal();
    });

    render();
  </script>

<script src="js/i18n.js"></script>
</body>
</html>
