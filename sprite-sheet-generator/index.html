<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RPGツクール スプライトシート生成ツール</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', 'Hiragino Sans', sans-serif;
  background: #1a1a2e;
  color: #e0e0e0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}
h1 { font-size: 1.4em; margin-bottom: 8px; color: #fff; }
.subtitle { font-size: 0.85em; color: #888; margin-bottom: 20px; }
.controls {
  display: flex; gap: 16px; align-items: center;
  margin-bottom: 20px; flex-wrap: wrap; justify-content: center;
}
.controls label { font-size: 0.9em; color: #aaa; }
.controls select, .controls input[type="color"] {
  background: #2a2a4a; color: #fff; border: 1px solid #444;
  padding: 6px 10px; border-radius: 6px; font-size: 0.9em;
}
.controls input[type="color"] { width: 40px; height: 32px; padding: 2px; cursor: pointer; }
.controls input[type="checkbox"] { margin-right: 4px; }
.drop-zone {
  width: 320px; height: 200px; border: 2px dashed #555;
  border-radius: 12px; display: flex; flex-direction: column;
  align-items: center; justify-content: center; cursor: pointer;
  transition: all 0.2s; margin-bottom: 20px; background: #16213e;
}
.drop-zone:hover, .drop-zone.dragover { border-color: #4fc3f7; background: #1a2744; }
.drop-zone .icon { font-size: 2.5em; margin-bottom: 8px; }
.drop-zone p { font-size: 0.9em; color: #888; }
.drop-zone p.main-text { color: #ccc; font-size: 1em; margin-bottom: 4px; }
input[type="file"] { display: none; }
.preview-area {
  display: flex; gap: 30px; flex-wrap: wrap;
  justify-content: center; align-items: flex-start; margin-bottom: 20px;
}
.preview-box { text-align: center; }
.preview-box h3 { font-size: 0.85em; color: #888; margin-bottom: 8px; }
.preview-box canvas {
  border: 1px solid #333; border-radius: 4px;
  image-rendering: pixelated; background: repeating-conic-gradient(#333 0% 25%, #222 0% 50%) 50% / 16px 16px;
}
.result-area { text-align: center; }
.btn {
  background: #4fc3f7; color: #111; border: none;
  padding: 10px 24px; border-radius: 8px; font-size: 1em;
  font-weight: bold; cursor: pointer; transition: background 0.2s; margin-top: 12px;
}
.btn:hover { background: #81d4fa; }
.btn:disabled { background: #444; color: #777; cursor: not-allowed; }
.info { font-size: 0.8em; color: #666; margin-top: 16px; text-align: center; max-width: 550px; }
.row-labels {
  display: flex; flex-direction: column; justify-content: space-around;
  font-size: 0.75em; color: #888; padding: 20px 0;
}
.note { font-size: 0.8em; color: #f0ad4e; margin-top: 10px; max-width: 550px; text-align: center; }
</style>
</head>
<body>

<h1>RPGツクール スプライトシート生成ツール</h1>
<p class="subtitle">正面画像1枚から 3x4 スプライトシートを自動生成</p>

<div class="controls">
  <label>セルサイズ:
    <select id="cellSize">
      <option value="32">32x32</option>
      <option value="48" selected>48x48</option>
      <option value="64">64x64</option>
      <option value="96">96x96</option>
    </select>
  </label>
  <label>
    <input type="checkbox" id="autoBg" checked>
    背景自動除去
  </label>
  <label>背景色:
    <input type="color" id="bgColor" value="#ffffff">
  </label>
  <label>許容値:
    <select id="bgTolerance">
      <option value="20">低</option>
      <option value="40" selected>中</option>
      <option value="60">高</option>
    </select>
  </label>
</div>

<div class="drop-zone" id="dropZone">
  <div class="icon">📁</div>
  <p class="main-text">画像をドラッグ＆ドロップ</p>
  <p>またはクリックして選択</p>
</div>
<input type="file" id="fileInput" accept="image/*">

<div class="preview-area" id="previewArea" style="display:none;">
  <div class="preview-box">
    <h3>入力画像（背景除去後）</h3>
    <canvas id="inputPreview"></canvas>
  </div>
  <div class="preview-box">
    <h3>スプライトシート</h3>
    <div style="display:flex; align-items:stretch;">
      <div class="row-labels">
        <span>正面 ↓</span>
        <span>左 ←</span>
        <span>右 →</span>
        <span>後ろ ↑</span>
      </div>
      <canvas id="sheetPreview"></canvas>
    </div>
  </div>
</div>

<div class="result-area" id="resultArea" style="display:none;">
  <button class="btn" id="downloadBtn">ダウンロード (.png)</button>
</div>

<p class="note" id="bgNote" style="display:none;">
  背景色が自動検出されました。うまくいかない場合は「背景色」を手動で選択してください。
</p>

<p class="info">
  対応形式: PNG / JPG / GIF / WebP（透過PNG推奨）<br>
  出力: RPGツクール標準 3列x4行（正面・左・右・後ろ × 歩行左・立ち・歩行右）<br>
  ※ 横向き・後ろ向きは正面画像からの近似生成です
</p>

<script>
const $ = id => document.getElementById(id);
const dropZone = $('dropZone'), fileInput = $('fileInput');
const cellSizeSelect = $('cellSize'), autoBgCheck = $('autoBg');
const bgColorInput = $('bgColor'), bgToleranceSelect = $('bgTolerance');
const previewArea = $('previewArea'), resultArea = $('resultArea');
const downloadBtn = $('downloadBtn'), bgNote = $('bgNote');
const inputPreview = $('inputPreview'), sheetPreview = $('sheetPreview');

let currentImage = null, sheetDataURL = null;

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('dragover');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => { if (e.target.files.length) handleFile(e.target.files[0]); });
[cellSizeSelect, autoBgCheck, bgColorInput, bgToleranceSelect].forEach(el =>
  el.addEventListener('change', () => { if (currentImage) generate(); })
);

function handleFile(file) {
  if (!file.type.startsWith('image/')) { alert('画像ファイルを選択してください'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => { currentImage = img; generate(); };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function newCanvas(w, h) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  return c;
}

function getPixels(c) { return c.getContext('2d').getImageData(0, 0, c.width, c.height); }
function putPixels(c, d) { c.getContext('2d').putImageData(d, 0, 0); }

function fromImageData(d) {
  const c = newCanvas(d.width, d.height);
  putPixels(c, d); return c;
}

function cloneCanvas(src) {
  const c = newCanvas(src.width, src.height);
  c.getContext('2d').drawImage(src, 0, 0);
  return c;
}

// --- 背景除去 ---

function detectBgColor(canvas) {
  const d = getPixels(canvas).data;
  const w = canvas.width, h = canvas.height;
  // 四隅のピクセルからもっとも多い色を取得
  const corners = [];
  for (let dy = 0; dy < 3; dy++) {
    for (let dx = 0; dx < 3; dx++) {
      corners.push([dx, dy]);
      corners.push([w - 1 - dx, dy]);
      corners.push([dx, h - 1 - dy]);
      corners.push([w - 1 - dx, h - 1 - dy]);
    }
  }
  const colorCount = {};
  corners.forEach(([x, y]) => {
    const i = (y * w + x) * 4;
    const key = `${d[i]},${d[i+1]},${d[i+2]}`;
    colorCount[key] = (colorCount[key] || 0) + 1;
  });
  let best = null, bestCount = 0;
  for (const [key, count] of Object.entries(colorCount)) {
    if (count > bestCount) { best = key; bestCount = count; }
  }
  const [r, g, b] = best.split(',').map(Number);
  return [r, g, b];
}

function removeBg(canvas, bgR, bgG, bgB, tolerance) {
  const id = getPixels(canvas);
  const d = id.data;
  for (let i = 0; i < d.length; i += 4) {
    const dr = d[i] - bgR, dg = d[i+1] - bgG, db = d[i+2] - bgB;
    const dist = Math.sqrt(dr*dr + dg*dg + db*db);
    if (dist < tolerance) {
      d[i+3] = 0; // 透明にする
    } else if (dist < tolerance * 1.5) {
      // エッジを半透明にしてなめらかに
      const alpha = Math.min(255, Math.round((dist - tolerance) / (tolerance * 0.5) * 255));
      d[i+3] = Math.min(d[i+3], alpha);
    }
  }
  return fromImageData(id);
}

// --- キャラクターの境界ボックス検出 ---

function findCharBounds(canvas) {
  const d = getPixels(canvas).data;
  const w = canvas.width, h = canvas.height;
  let minX = w, maxX = 0, minY = h, maxY = 0;
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      if (d[(y * w + x) * 4 + 3] > 32) {
        if (x < minX) minX = x;
        if (x > maxX) maxX = x;
        if (y < minY) minY = y;
        if (y > maxY) maxY = y;
      }
    }
  }
  return { minX, maxX, minY, maxY };
}

// キャラクターを中央に配置してセルサイズに合わせる
function centerCharacter(canvas, size) {
  const bounds = findCharBounds(canvas);
  if (bounds.minX > bounds.maxX) return newCanvas(size, size); // 空

  const charW = bounds.maxX - bounds.minX + 1;
  const charH = bounds.maxY - bounds.minY + 1;

  // セルに収まるようにスケール（少し余白を残す）
  const margin = Math.max(1, Math.floor(size * 0.05));
  const available = size - margin * 2;
  const scale = Math.min(available / charW, available / charH, 1);

  const scaledW = Math.round(charW * scale);
  const scaledH = Math.round(charH * scale);

  const c = newCanvas(size, size);
  const ctx = c.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  const dx = Math.floor((size - scaledW) / 2);
  const dy = size - scaledH - margin; // 足元を下揃え
  ctx.drawImage(canvas, bounds.minX, bounds.minY, charW, charH, dx, dy, scaledW, scaledH);
  return c;
}

// --- 歩行アニメーション ---

function makeWalkFrame(standing, direction, size) {
  // direction: -1=左足前, +1=右足前
  const w = standing.width, h = standing.height;
  const bounds = findCharBounds(standing);
  if (bounds.minX > bounds.maxX) return cloneCanvas(standing);

  const charH = bounds.maxY - bounds.minY + 1;
  // 下から1/3を足とみなす
  const legStart = bounds.maxY - Math.floor(charH * 0.33);
  const legH = bounds.maxY - legStart + 1;

  const srcData = getPixels(standing);
  const sd = srcData.data;
  const dst = new ImageData(w, h);
  const dd = dst.data;

  const shiftPx = Math.max(1, Math.round(size / 20)) * direction;
  const bounce = -Math.max(1, Math.floor(size / 32));

  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const si = (y * w + x) * 4;
      if (sd[si + 3] === 0) continue;

      let nx = x, ny = y + bounce;
      if (y >= legStart) {
        const progress = (y - legStart) / Math.max(legH - 1, 1);
        nx = x + Math.round(shiftPx * progress);
      }
      if (nx >= 0 && nx < w && ny >= 0 && ny < h) {
        const di = (ny * w + nx) * 4;
        dd[di] = sd[si]; dd[di+1] = sd[si+1];
        dd[di+2] = sd[si+2]; dd[di+3] = sd[si+3];
      }
    }
  }
  return fromImageData(dst);
}

// --- 横向き ---

function makeSideView(front, size) {
  const w = front.width, h = front.height;
  const srcData = getPixels(front);
  const sd = srcData.data;
  const bounds = findCharBounds(front);
  if (bounds.minX > bounds.maxX) return cloneCanvas(front);

  const centerX = (bounds.minX + bounds.maxX) / 2;
  const dst = new ImageData(w, h);
  const dd = dst.data;

  // 左半分を少し右にシフト、右半分を少し左にシフトして薄くする
  // → 横向きに見せる
  const shiftPx = Math.max(1, Math.round(size / 16));

  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const si = (y * w + x) * 4;
      if (sd[si + 3] === 0) continue;

      let nx;
      if (x <= centerX) {
        // 左半分 → 右にシフト（体の奥側として前に出す）
        nx = x + shiftPx;
      } else {
        // 右半分 → さらに右にシフト（体の手前側）
        nx = x + Math.round(shiftPx * 0.3);
      }

      if (nx >= 0 && nx < w) {
        const di = (y * w + nx) * 4;
        dd[di] = sd[si]; dd[di+1] = sd[si+1];
        dd[di+2] = sd[si+2]; dd[di+3] = sd[si+3];
      }
    }
  }
  return fromImageData(dst);
}

function flipH(canvas) {
  const c = newCanvas(canvas.width, canvas.height);
  const ctx = c.getContext('2d');
  ctx.scale(-1, 1);
  ctx.drawImage(canvas, -canvas.width, 0);
  return c;
}

// --- 後ろ向き ---

function makeBackView(front, size) {
  const w = front.width, h = front.height;
  const srcData = getPixels(front);
  const sd = srcData.data;
  const bounds = findCharBounds(front);
  if (bounds.minX > bounds.maxX) return cloneCanvas(front);

  const charH = bounds.maxY - bounds.minY + 1;
  // 頭部 = 上から35%, 胴体 = 35%〜65%, 足 = 65%〜
  const headEnd = bounds.minY + Math.floor(charH * 0.35);
  const bodyEnd = bounds.minY + Math.floor(charH * 0.65);

  // 頭部の中の「顔」領域（中央60%）を特定
  const headMinX = bounds.minX;
  const headMaxX = bounds.maxX;
  const headW = headMaxX - headMinX;
  const faceLX = headMinX + Math.floor(headW * 0.2);
  const faceRX = headMaxX - Math.floor(headW * 0.2);

  // 髪色を取得（頭の上部の外縁ピクセル）
  const hairColors = [];
  for (let y = bounds.minY; y < Math.min(bounds.minY + Math.floor(charH * 0.15), h); y++) {
    for (let x = 0; x < w; x++) {
      const i = (y * w + x) * 4;
      if (sd[i + 3] > 128) {
        hairColors.push([sd[i], sd[i+1], sd[i+2]]);
      }
    }
  }
  let hairR = 80, hairG = 60, hairB = 40;
  if (hairColors.length > 0) {
    hairR = Math.round(hairColors.reduce((s, c) => s + c[0], 0) / hairColors.length);
    hairG = Math.round(hairColors.reduce((s, c) => s + c[1], 0) / hairColors.length);
    hairB = Math.round(hairColors.reduce((s, c) => s + c[2], 0) / hairColors.length);
  }

  const dst = new ImageData(w, h);
  const dd = dst.data;

  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const si = (y * w + x) * 4;
      if (sd[si + 3] === 0) continue;

      if (y < headEnd && y >= bounds.minY) {
        // 頭部：顔の中央部分を髪色で塗りつぶし、外縁はそのまま（髪の毛）
        if (x >= faceLX && x <= faceRX && y > bounds.minY + Math.floor(charH * 0.12)) {
          // 顔部分 → 髪色に置換
          dd[si] = hairR;
          dd[si+1] = hairG;
          dd[si+2] = hairB;
          dd[si+3] = sd[si+3];
        } else {
          // 髪の外縁 → そのまま
          dd[si] = sd[si]; dd[si+1] = sd[si+1];
          dd[si+2] = sd[si+2]; dd[si+3] = sd[si+3];
        }
      } else if (y < bodyEnd) {
        // 胴体：ほぼそのまま、少し暗く
        dd[si] = Math.round(sd[si] * 0.92);
        dd[si+1] = Math.round(sd[si+1] * 0.92);
        dd[si+2] = Math.round(sd[si+2] * 0.92);
        dd[si+3] = sd[si+3];
      } else {
        // 足：そのまま
        dd[si] = sd[si]; dd[si+1] = sd[si+1];
        dd[si+2] = sd[si+2]; dd[si+3] = sd[si+3];
      }
    }
  }
  return fromImageData(dst);
}

// --- メイン生成 ---

function generate() {
  const size = parseInt(cellSizeSelect.value);
  const tolerance = parseInt(bgToleranceSelect.value);
  const autoBg = autoBgCheck.checked;

  // 元画像をcanvasに
  let raw = newCanvas(currentImage.width, currentImage.height);
  raw.getContext('2d').drawImage(currentImage, 0, 0);

  // 背景除去
  let processed = raw;
  if (autoBg) {
    const [bgR, bgG, bgB] = detectBgColor(raw);
    bgColorInput.value = '#' + [bgR, bgG, bgB].map(v => v.toString(16).padStart(2, '0')).join('');
    processed = removeBg(raw, bgR, bgG, bgB, tolerance);
    bgNote.style.display = 'block';
  } else {
    const hex = bgColorInput.value;
    const bgR = parseInt(hex.substr(1, 2), 16);
    const bgG = parseInt(hex.substr(3, 2), 16);
    const bgB = parseInt(hex.substr(5, 2), 16);
    processed = removeBg(raw, bgR, bgG, bgB, tolerance);
    bgNote.style.display = 'none';
  }

  // セルサイズに合わせて中央配置
  const front = centerCharacter(processed, size);

  // プレビュー
  const scale = Math.max(2, Math.floor(160 / size));
  inputPreview.width = size * scale;
  inputPreview.height = size * scale;
  const ictx = inputPreview.getContext('2d');
  ictx.imageSmoothingEnabled = false;
  ictx.drawImage(front, 0, 0, size * scale, size * scale);

  // スプライトシート生成
  const frontStand = front;
  const frontWalkL = makeWalkFrame(frontStand, -1, size);
  const frontWalkR = makeWalkFrame(frontStand, 1, size);

  const leftStand = makeSideView(frontStand, size);
  const leftWalkL = makeWalkFrame(leftStand, -1, size);
  const leftWalkR = makeWalkFrame(leftStand, 1, size);

  const rightStand = flipH(leftStand);
  const rightWalkL = flipH(leftWalkR);
  const rightWalkR = flipH(leftWalkL);

  const backStand = makeBackView(frontStand, size);
  const backWalkL = makeWalkFrame(backStand, -1, size);
  const backWalkR = makeWalkFrame(backStand, 1, size);

  const sheetW = size * 3, sheetH = size * 4;
  const sheet = newCanvas(sheetW, sheetH);
  const ctx = sheet.getContext('2d');

  const rows = [
    [frontWalkL, frontStand, frontWalkR],
    [leftWalkL,  leftStand,  leftWalkR],
    [rightWalkL, rightStand, rightWalkR],
    [backWalkL,  backStand,  backWalkR],
  ];
  rows.forEach((row, ri) => {
    row.forEach((frame, ci) => {
      ctx.drawImage(frame, ci * size, ri * size);
    });
  });

  // シートプレビュー
  sheetPreview.width = sheetW * scale;
  sheetPreview.height = sheetH * scale;
  const sctx = sheetPreview.getContext('2d');
  sctx.imageSmoothingEnabled = false;
  sctx.drawImage(sheet, 0, 0, sheetW * scale, sheetH * scale);

  sheetDataURL = sheet.toDataURL('image/png');
  previewArea.style.display = 'flex';
  resultArea.style.display = 'block';
}

downloadBtn.addEventListener('click', () => {
  if (!sheetDataURL) return;
  const a = document.createElement('a');
  a.href = sheetDataURL;
  a.download = 'spritesheet.png';
  a.click();
});
</script>
</body>
</html>
