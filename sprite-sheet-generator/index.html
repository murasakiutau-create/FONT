<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RPGツクール スプライトシート生成ツール</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', 'Hiragino Sans', sans-serif;
  background: #1a1a2e;
  color: #e0e0e0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}
h1 { font-size: 1.4em; margin-bottom: 4px; color: #fff; }
.subtitle { font-size: 0.85em; color: #888; margin-bottom: 20px; }

.settings {
  display: flex; gap: 16px; align-items: center;
  margin-bottom: 20px; flex-wrap: wrap; justify-content: center;
}
.settings label { font-size: 0.9em; color: #aaa; }
.settings select, .settings input[type="color"] {
  background: #2a2a4a; color: #fff; border: 1px solid #444;
  padding: 6px 10px; border-radius: 6px; font-size: 0.9em;
}
.settings input[type="color"] { width: 40px; height: 32px; padding: 2px; cursor: pointer; }
.settings input[type="checkbox"] { margin-right: 4px; }

.input-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-bottom: 24px;
  max-width: 420px;
  width: 100%;
}
.input-slot {
  background: #16213e;
  border: 2px dashed #444;
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
  padding: 12px;
  min-height: 140px;
  position: relative;
}
.input-slot:hover { border-color: #4fc3f7; background: #1a2744; }
.input-slot.filled { border-style: solid; border-color: #4fc3f7; }
.input-slot .direction { font-size: 0.85em; color: #aaa; margin-bottom: 6px; font-weight: bold; }
.input-slot .icon { font-size: 1.8em; margin-bottom: 4px; }
.input-slot .hint { font-size: 0.75em; color: #666; }
.input-slot canvas {
  image-rendering: pixelated;
  border-radius: 4px;
  background: repeating-conic-gradient(#333 0% 25%, #252 0% 50%) 50% / 10px 10px;
}
.input-slot .remove-btn {
  position: absolute; top: 4px; right: 8px;
  background: none; border: none; color: #f55; font-size: 1.1em;
  cursor: pointer; display: none;
}
.input-slot.filled .remove-btn { display: block; }
input[type="file"] { display: none; }

.divider {
  width: 100%; max-width: 500px; border-top: 1px solid #333;
  margin: 8px 0 20px;
}

.result-section { text-align: center; margin-bottom: 20px; }
.result-section h2 { font-size: 1.1em; color: #ccc; margin-bottom: 12px; }
.result-section canvas {
  image-rendering: pixelated;
  border: 1px solid #333;
  border-radius: 6px;
  background: repeating-conic-gradient(#333 0% 25%, #222 0% 50%) 50% / 16px 16px;
}
.result-flex {
  display: flex; align-items: stretch; justify-content: center; gap: 4px;
}
.row-labels {
  display: flex; flex-direction: column; justify-content: space-around;
  font-size: 0.75em; color: #888;
}
.btn {
  background: #4fc3f7; color: #111; border: none;
  padding: 10px 28px; border-radius: 8px; font-size: 1em;
  font-weight: bold; cursor: pointer; transition: background 0.2s; margin-top: 14px;
}
.btn:hover { background: #81d4fa; }
.btn:disabled { background: #333; color: #666; cursor: not-allowed; }

.anim-preview {
  display: flex; gap: 24px; justify-content: center;
  flex-wrap: wrap; margin-top: 16px; margin-bottom: 16px;
}
.anim-box { text-align: center; }
.anim-box .label { font-size: 0.75em; color: #888; margin-bottom: 4px; }
.anim-box canvas {
  image-rendering: pixelated; border-radius: 4px;
  background: repeating-conic-gradient(#333 0% 25%, #222 0% 50%) 50% / 10px 10px;
}

.info {
  font-size: 0.8em; color: #666; margin-top: 16px;
  text-align: center; max-width: 550px;
}
</style>
</head>
<body>

<h1>RPGツクール スプライトシート生成ツール</h1>
<p class="subtitle">4方向の立ち絵から歩行アニメーション付きスプライトシートを生成</p>

<div class="settings">
  <label>セルサイズ:
    <select id="cellSize">
      <option value="32">32x32</option>
      <option value="48" selected>48x48</option>
      <option value="64">64x64</option>
      <option value="96">96x96</option>
    </select>
  </label>
  <label>
    <input type="checkbox" id="autoBg" checked>
    背景自動除去
  </label>
  <label>背景色:
    <input type="color" id="bgColor" value="#ffffff">
  </label>
  <label>許容値:
    <select id="bgTolerance">
      <option value="20">低</option>
      <option value="40" selected>中</option>
      <option value="60">高</option>
    </select>
  </label>
</div>

<div class="input-grid">
  <div class="input-slot" data-dir="down" id="slot-down">
    <button class="remove-btn" title="削除">&times;</button>
    <span class="direction">正面（下）</span>
    <span class="icon">⬇️</span>
    <span class="hint">クリックして画像を選択</span>
  </div>
  <div class="input-slot" data-dir="left" id="slot-left">
    <button class="remove-btn" title="削除">&times;</button>
    <span class="direction">左向き</span>
    <span class="icon">⬅️</span>
    <span class="hint">クリックして画像を選択</span>
  </div>
  <div class="input-slot" data-dir="right" id="slot-right">
    <button class="remove-btn" title="削除">&times;</button>
    <span class="direction">右向き</span>
    <span class="icon">➡️</span>
    <span class="hint">クリックして画像を選択</span>
  </div>
  <div class="input-slot" data-dir="up" id="slot-up">
    <button class="remove-btn" title="削除">&times;</button>
    <span class="direction">後ろ（上）</span>
    <span class="icon">⬆️</span>
    <span class="hint">クリックして画像を選択</span>
  </div>
</div>

<input type="file" id="fileInput" accept="image/*">

<div class="divider"></div>

<div class="result-section" id="resultSection" style="display:none;">
  <h2>歩行アニメーション プレビュー</h2>
  <div class="anim-preview" id="animPreview"></div>

  <h2>スプライトシート</h2>
  <div class="result-flex">
    <div class="row-labels" id="rowLabels"></div>
    <canvas id="sheetCanvas"></canvas>
  </div>
  <br>
  <button class="btn" id="downloadBtn">ダウンロード (.png)</button>
</div>

<p class="info">
  4方向すべて入力しなくてもOK（入力した方向だけ生成されます）<br>
  対応形式: PNG / JPG / GIF / WebP（透過PNG推奨）<br>
  出力: RPGツクール標準 3列（歩行左・立ち・歩行右）
</p>

<script>
// --- State ---
const images = { down: null, left: null, right: null, up: null };
let activeSlot = null;
let sheetDataURL = null;
let animTimers = [];

const $ = id => document.getElementById(id);
const fileInput = $('fileInput');

// --- Slot click / file handling ---
document.querySelectorAll('.input-slot').forEach(slot => {
  slot.addEventListener('click', e => {
    if (e.target.classList.contains('remove-btn')) return;
    activeSlot = slot.dataset.dir;
    fileInput.click();
  });
  slot.querySelector('.remove-btn').addEventListener('click', e => {
    e.stopPropagation();
    images[slot.dataset.dir] = null;
    resetSlot(slot);
    generateIfAny();
  });
  // ドラッグ＆ドロップ（各スロット）
  slot.addEventListener('dragover', e => { e.preventDefault(); slot.classList.add('dragover'); });
  slot.addEventListener('dragleave', () => slot.classList.remove('dragover'));
  slot.addEventListener('drop', e => {
    e.preventDefault(); slot.classList.remove('dragover');
    if (e.dataTransfer.files.length) {
      activeSlot = slot.dataset.dir;
      loadFile(e.dataTransfer.files[0]);
    }
  });
});

fileInput.addEventListener('change', e => {
  if (e.target.files.length && activeSlot) loadFile(e.target.files[0]);
  fileInput.value = '';
});

function loadFile(file) {
  if (!file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      images[activeSlot] = img;
      showSlotPreview(activeSlot, img);
      generateIfAny();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function resetSlot(slot) {
  slot.classList.remove('filled');
  const existing = slot.querySelector('canvas');
  if (existing) existing.remove();
  slot.querySelector('.icon').style.display = '';
  slot.querySelector('.hint').style.display = '';
}

function showSlotPreview(dir, img) {
  const slot = $('slot-' + dir);
  slot.classList.add('filled');
  slot.querySelector('.icon').style.display = 'none';
  slot.querySelector('.hint').style.display = 'none';
  const existing = slot.querySelector('canvas');
  if (existing) existing.remove();

  const size = 80;
  const c = document.createElement('canvas');
  c.width = size; c.height = size;
  const ctx = c.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  // 処理済み画像をプレビュー
  const processed = processInput(img, parseInt($('cellSize').value));
  ctx.drawImage(processed, 0, 0, size, size);
  slot.appendChild(c);
}

// --- Settings change ---
[$('cellSize'), $('autoBg'), $('bgColor'), $('bgTolerance')].forEach(el =>
  el.addEventListener('change', () => {
    // プレビュー更新
    for (const dir of ['down', 'left', 'right', 'up']) {
      if (images[dir]) showSlotPreview(dir, images[dir]);
    }
    generateIfAny();
  })
);

// --- Canvas helpers ---
function newCanvas(w, h) {
  const c = document.createElement('canvas'); c.width = w; c.height = h; return c;
}
function getPixels(c) { return c.getContext('2d').getImageData(0, 0, c.width, c.height); }
function fromImageData(d) {
  const c = newCanvas(d.width, d.height);
  c.getContext('2d').putImageData(d, 0, 0); return c;
}

// --- Background removal ---
function detectBgColor(canvas) {
  const d = getPixels(canvas).data;
  const w = canvas.width, h = canvas.height;
  const corners = [];
  for (let dy = 0; dy < 3; dy++) {
    for (let dx = 0; dx < 3; dx++) {
      corners.push([dx, dy], [w-1-dx, dy], [dx, h-1-dy], [w-1-dx, h-1-dy]);
    }
  }
  const counts = {};
  corners.forEach(([x, y]) => {
    const i = (y * w + x) * 4;
    const k = `${d[i]},${d[i+1]},${d[i+2]}`;
    counts[k] = (counts[k] || 0) + 1;
  });
  let best = '255,255,255', bestN = 0;
  for (const [k, n] of Object.entries(counts)) { if (n > bestN) { best = k; bestN = n; } }
  return best.split(',').map(Number);
}

function removeBg(canvas, bgR, bgG, bgB, tol) {
  const id = getPixels(canvas);
  const d = id.data;
  for (let i = 0; i < d.length; i += 4) {
    const dr = d[i]-bgR, dg = d[i+1]-bgG, db = d[i+2]-bgB;
    const dist = Math.sqrt(dr*dr + dg*dg + db*db);
    if (dist < tol) { d[i+3] = 0; }
    else if (dist < tol * 1.5) { d[i+3] = Math.min(d[i+3], Math.round((dist-tol)/(tol*0.5)*255)); }
  }
  return fromImageData(id);
}

// --- Bounding & center ---
function findBounds(canvas) {
  const d = getPixels(canvas).data;
  const w = canvas.width, h = canvas.height;
  let x0 = w, x1 = 0, y0 = h, y1 = 0;
  for (let y = 0; y < h; y++) for (let x = 0; x < w; x++) {
    if (d[(y*w+x)*4+3] > 32) {
      if (x < x0) x0 = x; if (x > x1) x1 = x;
      if (y < y0) y0 = y; if (y > y1) y1 = y;
    }
  }
  return { x0, x1, y0, y1 };
}

function centerInCell(canvas, size) {
  const b = findBounds(canvas);
  if (b.x0 > b.x1) return newCanvas(size, size);
  const cw = b.x1 - b.x0 + 1, ch = b.y1 - b.y0 + 1;
  const margin = Math.max(1, Math.floor(size * 0.04));
  const avail = size - margin * 2;
  const scale = Math.min(avail / cw, avail / ch, 1);
  const sw = Math.round(cw * scale), sh = Math.round(ch * scale);
  const c = newCanvas(size, size);
  const ctx = c.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(canvas, b.x0, b.y0, cw, ch,
    Math.floor((size - sw) / 2), size - sh - margin, sw, sh);
  return c;
}

// --- Input processing pipeline ---
function processInput(img, size) {
  let raw = newCanvas(img.width, img.height);
  raw.getContext('2d').drawImage(img, 0, 0);

  // 既に透過がある画像かチェック
  const rawData = getPixels(raw).data;
  let hasTransparency = false;
  for (let i = 3; i < rawData.length; i += 4) {
    if (rawData[i] < 250) { hasTransparency = true; break; }
  }

  let processed = raw;
  if (!hasTransparency) {
    const tol = parseInt($('bgTolerance').value);
    if ($('autoBg').checked) {
      const [r, g, b] = detectBgColor(raw);
      processed = removeBg(raw, r, g, b, tol);
    } else {
      const hex = $('bgColor').value;
      processed = removeBg(raw,
        parseInt(hex.substr(1,2),16),
        parseInt(hex.substr(3,2),16),
        parseInt(hex.substr(5,2),16), tol);
    }
  }
  return centerInCell(processed, size);
}

// --- Walk animation ---
function makeWalkFrame(standing, direction, size) {
  // direction: -1 = 左足前, +1 = 右足前
  const w = standing.width, h = standing.height;
  const b = findBounds(standing);
  if (b.x0 > b.x1) return standing;

  const charH = b.y1 - b.y0 + 1;
  const legStart = b.y1 - Math.floor(charH * 0.35);

  const src = getPixels(standing);
  const sd = src.data;
  const dst = new ImageData(w, h);
  const dd = dst.data;

  const shiftPx = Math.max(1, Math.round(size / 22)) * direction;
  const bounce = Math.max(1, Math.floor(size / 32));

  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const si = (y * w + x) * 4;
      if (sd[si+3] === 0) continue;

      let nx = x, ny = y - bounce; // 全体を少し上に（バウンス）
      if (y >= legStart) {
        const legH = b.y1 - legStart;
        const progress = legH > 0 ? (y - legStart) / legH : 0;
        nx = x + Math.round(shiftPx * progress);
      }
      if (nx >= 0 && nx < w && ny >= 0 && ny < h) {
        const di = (ny * w + nx) * 4;
        dd[di] = sd[si]; dd[di+1] = sd[si+1];
        dd[di+2] = sd[si+2]; dd[di+3] = sd[si+3];
      }
    }
  }
  return fromImageData(dst);
}

// --- Generate ---
function generateIfAny() {
  const dirs = ['down', 'left', 'right', 'up'];
  const dirLabels = { down: '正面 ↓', left: '左 ←', right: '右 →', up: '後ろ ↑' };
  const activeDirs = dirs.filter(d => images[d]);

  // Clear previous animations
  animTimers.forEach(t => clearInterval(t));
  animTimers = [];

  if (activeDirs.length === 0) {
    $('resultSection').style.display = 'none';
    return;
  }

  const size = parseInt($('cellSize').value);

  // Process each direction
  const processed = {};
  const walkFrames = {};
  for (const dir of activeDirs) {
    processed[dir] = processInput(images[dir], size);
    walkFrames[dir] = {
      left: makeWalkFrame(processed[dir], -1, size),
      stand: processed[dir],
      right: makeWalkFrame(processed[dir], 1, size),
    };
  }

  // Animated previews
  const animContainer = $('animPreview');
  animContainer.innerHTML = '';
  const scale = Math.max(2, Math.floor(96 / size));

  for (const dir of activeDirs) {
    const box = document.createElement('div');
    box.className = 'anim-box';
    const label = document.createElement('div');
    label.className = 'label';
    label.textContent = dirLabels[dir];
    box.appendChild(label);
    const c = document.createElement('canvas');
    c.width = size * scale; c.height = size * scale;
    c.style.width = (size * scale) + 'px';
    c.style.height = (size * scale) + 'px';
    box.appendChild(c);
    animContainer.appendChild(box);

    // Animate: stand → walkL → stand → walkR → repeat
    const frames = [
      walkFrames[dir].stand,
      walkFrames[dir].left,
      walkFrames[dir].stand,
      walkFrames[dir].right,
    ];
    let fi = 0;
    const ctx = c.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    function drawFrame() {
      ctx.clearRect(0, 0, c.width, c.height);
      ctx.drawImage(frames[fi], 0, 0, size * scale, size * scale);
      fi = (fi + 1) % frames.length;
    }
    drawFrame();
    animTimers.push(setInterval(drawFrame, 200));
  }

  // Sprite sheet
  const sheetW = size * 3;
  const sheetH = size * activeDirs.length;
  const sheet = newCanvas(sheetW, sheetH);
  const sctx = sheet.getContext('2d');

  const rowLabelsEl = $('rowLabels');
  rowLabelsEl.innerHTML = '';

  activeDirs.forEach((dir, ri) => {
    const f = walkFrames[dir];
    sctx.drawImage(f.left, 0, ri * size);
    sctx.drawImage(f.stand, size, ri * size);
    sctx.drawImage(f.right, size * 2, ri * size);

    const span = document.createElement('span');
    span.textContent = dirLabels[dir];
    rowLabelsEl.appendChild(span);
  });

  // Preview
  const sheetCanvas = $('sheetCanvas');
  sheetCanvas.width = sheetW * scale;
  sheetCanvas.height = sheetH * scale;
  const pctx = sheetCanvas.getContext('2d');
  pctx.imageSmoothingEnabled = false;
  pctx.drawImage(sheet, 0, 0, sheetW * scale, sheetH * scale);

  sheetDataURL = sheet.toDataURL('image/png');
  $('resultSection').style.display = '';
}

// Download
$('downloadBtn').addEventListener('click', () => {
  if (!sheetDataURL) return;
  const a = document.createElement('a');
  a.href = sheetDataURL;
  a.download = 'spritesheet.png';
  a.click();
});
</script>
</body>
</html>
